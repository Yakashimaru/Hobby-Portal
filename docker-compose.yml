#version: '3.8'

services:
  crud_api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - FLASK_APP=apis/crud_apis.py  # Run CRUD API
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5004
    command: python -m apis.crud_apis
    ports:
      - "5004:5004"
    volumes:
      - ./backend:/backend

  vn_date:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - FLASK_APP=apis/vn_date.py  # Run Date API
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5005
    command: python -m apis.vn_date
    ports:
      - "5005:5005"
    volumes:
      - ./backend:/backend

